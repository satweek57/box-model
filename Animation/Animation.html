<!doctype html>
<html>
   <head>
      <title>Javascript Animation</title>
	  <script type="text/javascript">
	  var im=null;
	  var animate;
	  function init(){
	  im=document.getElementById("myImage");
	  im.style.position="relative";
	  im.style.left="0px";
	  }
	  
	 function moveRight(){
	    im.style.left=parseInt(im.style.left)+100+'px';
		animate=setTimeout(moveRight,1000);
		}
		
	 function Stop()
	 {
	 clearTimeout(animate);
	 /*im.style.left="0px";*/
	 }
	 </script>
	</head>
	<body onload="init()" bgcolor="#f2279A">
	<img id="myImage" height="100px" width="100px" />
	<p>click the start button to start the animation</p>
	<button onclick="moveRight()">start</button>
	<button onclick="Stop()">stop</button>
	</body>
</html>
